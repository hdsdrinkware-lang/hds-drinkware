name: Apply uploaded site package

on:
  push:
    paths:
      - hds-github-deploy-payload.zip
      - .github/workflows/apply-uploaded-site.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply uploaded site files
        run: |
          set -euo pipefail
          if [ ! -f hds-github-deploy-payload.zip ]; then
            echo "Payload zip not found yet. Waiting for the zip upload commit."
            exit 0
          fi
          unzip -o hds-github-deploy-payload.zip
          rm -f hds-github-deploy-payload.zip
          rm -f .github/workflows/apply-uploaded-site.yml
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add -A
          git commit -m "Deploy optimized HDS Drinkware site"
          git push
