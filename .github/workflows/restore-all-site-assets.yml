name: Restore All Site Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-all-site-assets.yml

permissions:
  contents: write

jobs:
  restore-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore complete asset library
        run: |
          curl -L "https://github.com/hdsdrinkware-lang/hds-drinkware/archive/eb098c8794004095bbbb2b8d9a6a10d4fc93d586.tar.gz" -o /tmp/site-source.tar.gz
          mkdir -p /tmp/site-source
          tar -xzf /tmp/site-source.tar.gz -C /tmp/site-source --strip-components=1
          test -d /tmp/site-source/assets
          rm -rf assets
          cp -R /tmp/site-source/assets assets
          test -f assets/company-logo.png
          test -f assets/hero-premium-custom-drinkware-gift-packaging.jpg
          test -f assets/catalog/40oz-handle-tumbler.jpg
          test -f assets/trust-proof/production-line.jpg
          find assets -type f | sort

      - name: Commit restored assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "No asset changes to commit"
            exit 0
          fi
          git commit -m "Restore complete site image assets"
          git push
